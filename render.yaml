services:
  - type: web
    name: occu-med-global-address-geocoder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEOCODER_USER_AGENT
        value: OccuMedAddressGeocoder/1.0
      - key: NOMINATIM_BASE_URL
        value: https://nominatim.openstreetmap.org/search
      - key: APP_ACCESS_PASSWORD
        sync: false
